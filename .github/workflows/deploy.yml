name: Deploy Synapse Storage System

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy to Mac Mini
    runs-on: self-hosted
    
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 📁 Sync Files to Deploy Directory
        run: |
          mkdir -p /home/linuxuser/synapse-storage-system
          rsync -av --delete --exclude='.git' --exclude='.github' ./ /home/linuxuser/synapse-storage-system/

      - name: 🚀 Configure and Start Services
        run: |
          cd /home/linuxuser/synapse-storage-system
          
          # Write remote .env configuration file
          echo "API_KEY=super_secret_homelab_key" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NAS_BASE_PATH=/mnt/nas_data" >> .env
          echo "KONG_GATEWAY_URL=http://127.0.0.1:8000" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DRY_RUN=False" >> .env
          echo "USE_LOCAL_LLM=True" >> .env
          echo "OLLAMA_URL=http://ollama:11434" >> .env
          echo "OLLAMA_MODEL=gemma2:2b" >> .env
          
          # Execute setup script and fix NAS mount permissions
          chmod +x deploy/setup_env.sh
          echo "${{ secrets.SSH_PASSWORD }}" | sudo -S bash deploy/setup_env.sh
          
          # Rebuild and start containerized stack
          echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose down
          echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker compose up -d --build
